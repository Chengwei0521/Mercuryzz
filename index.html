<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Mercuryzz Supabase Test</title>
    <style>
      :root {
        color-scheme: light;
        font-family:
          Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont,
          "Segoe UI", sans-serif;
        background: #f5f7f4;
        color: #172019;
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        min-height: 100vh;
        display: grid;
        place-items: center;
        padding: 24px;
      }

      main {
        width: min(680px, 100%);
      }

      .eyebrow {
        margin: 0 0 12px;
        color: #5e6a61;
        font-size: 14px;
        font-weight: 700;
      }

      h1 {
        margin: 0;
        font-size: clamp(40px, 8vw, 84px);
        line-height: 1;
        letter-spacing: 0;
      }

      .panel {
        margin-top: 28px;
        padding: 18px;
        border: 1px solid #d9ded8;
        background: #ffffff;
      }

      .label {
        margin: 0 0 8px;
        color: #66706a;
        font-size: 13px;
        font-weight: 700;
      }

      .message {
        margin: 0;
        min-height: 34px;
        font-size: 28px;
        font-weight: 800;
        overflow-wrap: anywhere;
      }

      .status {
        margin: 16px 0 0;
        color: #5e6a61;
        font-size: 14px;
      }

      .status[data-state="ok"] {
        color: #17683a;
      }

      .status[data-state="error"] {
        color: #a22522;
      }
    </style>
  </head>
  <body>
    <main>
      <p class="eyebrow">Mercuryzz</p>
      <h1>Supabase Test</h1>

      <section class="panel" aria-live="polite">
        <p class="label">Latest message from Supabase</p>
        <p class="message" id="message">Loading...</p>
        <p class="status" id="status">Connecting to Supabase...</p>
      </section>
    </main>

    <script>
      const SUPABASE_URL = "https://jgigvgysiykcyclxvjpn.supabase.co";
      const SUPABASE_KEY = "sb_publishable_RIVvsx8W5ejVCHcHJBdTIQ_0kPwH-_k";

      const messageElement = document.getElementById("message");
      const statusElement = document.getElementById("status");

      async function loadLatestMessage() {
        const response = await fetch(
          `${SUPABASE_URL}/rest/v1/messages?select=id,text,created_at&order=id.desc&limit=1`,
          {
            headers: {
              apikey: SUPABASE_KEY,
              Authorization: `Bearer ${SUPABASE_KEY}`,
            },
          },
        );

        if (!response.ok) {
          throw new Error(`Supabase returned ${response.status}`);
        }

        const rows = await response.json();
        return rows[0] ?? null;
      }

      loadLatestMessage()
        .then((row) => {
          messageElement.textContent = row?.text ?? "No message found";
          statusElement.textContent = row
            ? `Connected. Row #${row.id} loaded.`
            : "Connected. The messages table is empty.";
          statusElement.dataset.state = "ok";
        })
        .catch((error) => {
          messageElement.textContent = "Connection failed";
          statusElement.textContent = error.message;
          statusElement.dataset.state = "error";
        });
    </script>
  </body>
</html>
