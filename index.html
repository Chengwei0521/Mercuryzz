<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Mercuryzz</title>
    <style>
      :root {
        color-scheme: light;
        font-family:
          Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont,
          "Segoe UI", sans-serif;
        background: #f7f5ef;
        color: #17211b;
      }

      body {
        margin: 0;
        min-height: 100vh;
        display: grid;
        place-items: center;
      }

      main {
        width: min(640px, calc(100% - 40px));
      }

      p {
        margin: 0 0 12px;
        color: #4e5d53;
        font-size: 15px;
      }

      h1 {
        margin: 0;
        font-size: clamp(40px, 7vw, 84px);
        line-height: 1;
        letter-spacing: 0;
      }

      .status {
        margin-top: 24px;
        min-height: 20px;
        font-size: 14px;
        color: #657168;
      }
    </style>
  </head>
  <body>
    <main>
      <p>Mercuryzz Supabase test</p>
      <h1 id="message">Loading...</h1>
      <div class="status" id="status"></div>
    </main>

    <script>
      const SUPABASE_URL = "https://jgigvgysiykcyclxvjpn.supabase.co";
      const SUPABASE_KEY = "sb_publishable_RIVvsx8W5ejVCHcHJBdTIQ_0kPwH-_k";

      async function loadMessage() {
        const response = await fetch(
          `${SUPABASE_URL}/rest/v1/messages?select=text&order=id.asc&limit=1`,
          {
            headers: {
              apikey: SUPABASE_KEY,
              Authorization: `Bearer ${SUPABASE_KEY}`,
            },
          },
        );

        if (!response.ok) {
          throw new Error(`Supabase returned ${response.status}`);
        }

        const rows = await response.json();
        return rows[0]?.text ?? "No message found";
      }

      loadMessage()
        .then((message) => {
          document.getElementById("message").textContent = message;
          document.getElementById("status").textContent =
            "Loaded from Supabase";
        })
        .catch((error) => {
          document.getElementById("message").textContent = "Unable to load";
          document.getElementById("status").textContent = error.message;
        });
    </script>
  </body>
</html>
